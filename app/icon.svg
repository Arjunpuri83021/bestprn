<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="bestprn favicon">
  <defs>
    <linearGradient id="flameRed" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="hotPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background circle with flame gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#flameRed)"/>
  
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="26" fill="#1a0a0e"/>
  
  <!-- BP Letters -->
  <text x="12" y="42" font-size="28" font-weight="900" fill="url(#hotPink)" font-family="Arial, sans-serif">B</text>
  <text x="30" y="42" font-size="28" font-weight="900" fill="white" font-family="Arial, sans-serif">P</text>
  
  <!-- Flame accent -->
  <path d="M32 4 Q36 12 32 16 Q28 12 32 4" fill="#fbbf24" opacity="0.9"/>
</svg>
